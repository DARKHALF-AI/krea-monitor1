<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Half | KREA Runway Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d23;
            --accent-blue: #3498db;
            --accent-orange: #e67e22;
            --accent-green: #27ae60;
            --text-main: #e0e0e0;
            --text-dim: #9ea7b3;
            --border: #2d333b;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 18px;
        }
        h1 { margin: 0; font-weight: 300; letter-spacing: 2px; font-size: 24px; }
        .controls {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            border: 1px solid var(--border);
        }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="number"], input[type="date"], input[type="file"] {
            width: 100%;
            background: #2d333b;
            border: 1px solid #444;
            color: white;
            padding: 9px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .card h3 { margin: 0; color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
        .card .value { font-size: 1.7rem; font-weight: 700; margin-top: 10px; color: var(--accent-blue); }
        .card.alert .value { color: var(--accent-orange); }
        .card .sub { font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .roster-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 24px;
            overflow-x: auto;
        }
        .roster-card h2 { margin: 0 0 14px 0; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; }
        .roster-table { width: 100%; border-collapse: collapse; }
        .roster-table th { text-align: left; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; padding: 8px 10px; border-bottom: 1px solid var(--border); font-weight: 500; }
        .roster-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
        .roster-table tr:last-child td { border-bottom: none; }
        .roster-table input { padding: 6px 8px; font-size: 12px; }
        .roster-table .burn-cell input { width: 100px; text-align: right; }
        .roster-table .date-cell input { width: 150px; }
        .roster-table .pct-cell { color: var(--text-dim); width: 90px; text-align: right; }
        .roster-table .past td { color: var(--text-dim); opacity: 0.55; }
        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
        }
        .chart-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .chart-box h3 { color: var(--text-dim); font-size: 0.75rem; margin: 0 0 10px 0; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
        .chart-canvas-wrap { position: relative; flex: 1; height: 360px; min-height: 360px; }
        .status-badge { background: #27ae60; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        .roster-actions { display: flex; gap: 10px; margin-top: 14px; justify-content: flex-end; flex-wrap: wrap; }
        .roster-actions button {
            background: #2d333b;
            color: var(--text-main);
            border: 1px solid #444;
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }
        .roster-actions button:hover { background: #3a414b; }
        @media (max-width: 800px) {
            body { padding: 20px; }
            .grid { grid-template-columns: 1fr; }
            .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>DARK HALF | <span style="color:var(--accent-orange)">RUNWAY</span></h1>
        <div id="status" class="status-badge">7 Accounts Loaded</div>
    </div>

    <div class="controls">
        <div class="input-group"><label>Remaining Credits</label><input type="number" id="remainingCredits" value="9900000" step="100000"></div>
        <div class="input-group"><label>Today (anchor)</label><input type="date" id="anchorDate" value="2026-05-06"></div>
        <div class="input-group"><label>Upload Weekly CSVs</label><input type="file" id="fileInput" multiple accept=".csv"></div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Projected Runway</h3>
            <div class="value" id="runwayVal">--</div>
            <div class="sub" id="runwayWeeks"></div>
        </div>
        <div class="card alert">
            <h3>Current Daily Burn</h3>
            <div class="value" id="currentBurnVal">--</div>
            <div class="sub">Sum of active users</div>
        </div>
        <div class="card alert">
            <h3>Exhaustion Date</h3>
            <div class="value" id="exhaustionDateVal">--</div>
            <div class="sub" id="exhaustionRelative"></div>
        </div>
    </div>

    <div class="roster-card">
        <h2>Account Roster &mdash; Departure Schedule</h2>
        <table class="roster-table">
            <thead>
                <tr>
                    <th>Account</th>
                    <th style="text-align:right">Daily Burn (CU)</th>
                    <th style="text-align:right">% of Total</th>
                    <th>Departure Date</th>
                </tr>
            </thead>
            <tbody id="rosterBody"></tbody>
        </table>
        <div class="roster-actions">
            <button onclick="resetDeparturesTo('2027-12-31')">Reset all to Dec 31, 2027</button>
            <button onclick="resetDeparturesTo('2026-05-20')">All depart May 20, 2026</button>
        </div>
    </div>

    <div class="chart-grid">
        <div class="chart-box">
            <h3>Projected daily burn over time</h3>
            <div class="chart-canvas-wrap"><canvas id="burnTimelineChart" role="img" aria-label="Stepped line chart of total daily burn from today through the runway"></canvas></div>
        </div>
        <div class="chart-box">
            <h3>Burn by account</h3>
            <div class="chart-canvas-wrap"><canvas id="categoryChart" role="img" aria-label="Doughnut chart of daily burn share by active account"></canvas></div>
        </div>
    </div>
</div>

<script>
    const ROSTER = [
        { name: 'JAMES',   email: 'jkinnear@creamproductions.com',       burn: 59899, depart: '2026-05-15' },
        { name: 'IAN',     email: 'lordgodfrey@gmail.com',               burn: 41610, depart: '2027-12-31' },
        { name: 'SACHA',   email: 'sacha.d.m.mitchell@gmail.com',        burn: 34054, depart: '2027-12-31' },
        { name: 'WILL',    email: 'will@bluesheepfilms.com',             burn: 28107, depart: '2027-12-31' },
        { name: 'MARTY',   email: 'connect@martyflanagan.ca',            burn: 25752, depart: '2026-05-15' },
        { name: 'ANDREW',  email: 'amacdonald@creamproductions.com',     burn: 25483, depart: '2027-12-31' },
        { name: 'STEPHAN', email: 'skozak@creamproductions.com',         burn: 19396, depart: '2026-04-01' }
    ];

    let globalData = { history: [], categories: {} };
    let burnTimelineChart, catChart;

    function buildRoster() {
        const tbody = document.getElementById('rosterBody');
        tbody.innerHTML = '';
        ROSTER.forEach((u, i) => {
            const tr = document.createElement('tr');
            tr.id = `row-${i}`;
            tr.innerHTML = `
                <td><div style="font-weight:600; letter-spacing:0.5px">${u.name}</div><div style="font-size:11px; color:var(--text-dim)">${u.email}</div></td>
                <td class="burn-cell" style="text-align:right"><input type="number" id="burn-${i}" value="${u.burn}" step="100" min="0"></td>
                <td class="pct-cell" id="pct-${i}">--</td>
                <td class="date-cell"><input type="date" id="date-${i}" value="${u.depart}"></td>
            `;
            tbody.appendChild(tr);
        });
        ROSTER.forEach((_, i) => {
            document.getElementById(`burn-${i}`).addEventListener('input', recompute);
            document.getElementById(`date-${i}`).addEventListener('change', recompute);
        });
    }

    function readRoster() {
        return ROSTER.map((u, i) => ({
            name: u.name,
            email: u.email,
            burn: parseFloat(document.getElementById(`burn-${i}`).value) || 0,
            depart: new Date(document.getElementById(`date-${i}`).value)
        }));
    }

    function resetDeparturesTo(dateStr) {
        ROSTER.forEach((_, i) => { document.getElementById(`date-${i}`).value = dateStr; });
        recompute();
    }

    document.getElementById('fileInput').addEventListener('change', handleFiles);
    document.getElementById('remainingCredits').addEventListener('input', recompute);
    document.getElementById('anchorDate').addEventListener('change', recompute);

    async function handleFiles(e) {
        const files = Array.from(e.target.files);
        globalData.history = [];
        globalData.categories = {};
        for (const file of files) await parseFile(file);
        recompute();
        const status = document.getElementById('status');
        status.innerText = `${files.length} Files Loaded`;
        status.style.background = '#2980b9';
    }

    function parseFile(file) {
        return new Promise((resolve) => {
            Papa.parse(file, {
                header: true, skipEmptyLines: true,
                complete: function(results) { processResults(results.data, file.name); resolve(); }
            });
        });
    }

    function processResults(data, fileName) {
        let fileTotal = 0;
        data.forEach(row => {
            if (row['Category'] && row['Compute Units'] && row['Category'] !== 'Total') {
                const units = parseFloat(String(row['Compute Units']).replace(/,/g, '')) || 0;
                globalData.categories[row['Category']] = (globalData.categories[row['Category']] || 0) + units;
                fileTotal += units;
            }
        });
        if (fileTotal > 0) globalData.history.push({ name: fileName.split(' ')[0], units: fileTotal });
    }

    function dayBurn(roster, date) {
        return roster.filter(u => u.depart >= date).reduce((s, u) => s + u.burn, 0);
    }

    function recompute() {
        const credits = parseFloat(document.getElementById('remainingCredits').value) || 0;
        const anchorStr = document.getElementById('anchorDate').value;
        const today = anchorStr ? new Date(anchorStr) : new Date('2026-05-06');
        const roster = readRoster();
        const activeBurnToday = roster.filter(u => u.depart >= today).reduce((s, u) => s + u.burn, 0);

        const fullRosterBurn = roster.reduce((s, u) => s + u.burn, 0);
        roster.forEach((u, i) => {
            const isPast = u.depart < today;
            const tr = document.getElementById(`row-${i}`);
            if (tr) tr.classList.toggle('past', isPast);
            const cell = document.getElementById(`pct-${i}`);
            if (isPast) {
                const histPct = fullRosterBurn > 0 ? (u.burn / fullRosterBurn * 100) : 0;
                cell.innerHTML = `<span style="font-size:11px; color:var(--text-dim)">last:</span> ${histPct.toFixed(1)}%`;
            } else {
                const denom = activeBurnToday > 0 ? activeBurnToday : 1;
                cell.innerText = (u.burn / denom * 100).toFixed(1) + '%';
            }
        });

        let remaining = credits;
        let days = 0;
        const cursor = new Date(today);
        const MAX_DAYS = 365 * 5;
        while (days < MAX_DAYS) {
            const burn = dayBurn(roster, cursor);
            if (burn <= 0) { days = MAX_DAYS; break; }
            if (remaining < burn) break;
            remaining -= burn;
            days++;
            cursor.setDate(cursor.getDate() + 1);
        }

        document.getElementById('runwayVal').innerText = days >= MAX_DAYS ? '5+ Years' : days + ' Days';
        document.getElementById('runwayWeeks').innerText = days >= MAX_DAYS ? '' : `${(days / 7).toFixed(1)} weeks`;
        document.getElementById('currentBurnVal').innerText = Math.round(activeBurnToday).toLocaleString();

        const exhaustDate = new Date(today);
        exhaustDate.setDate(today.getDate() + days);
        if (days >= MAX_DAYS) {
            document.getElementById('exhaustionDateVal').innerText = 'Beyond 2031';
            document.getElementById('exhaustionRelative').innerText = '';
        } else {
            document.getElementById('exhaustionDateVal').innerText = exhaustDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
            document.getElementById('exhaustionRelative').innerText = `In ${days} days`;
        }

        updateBurnTimeline(today, roster, days);
        updateCategoryChart(roster, today);
    }

    // Historical actual daily-burn averages (CU/day) by month index, derived from KREA CSVs
    const HISTORY_MONTHLY = {
        0: 52488,    // Jan 2026 — 1,627,127 / 31
        1: 230026,   // Feb 2026 — 6,440,746 / 28
        2: 116924,   // Mar 2026 — 3,624,634 / 31
        3: 245321,   // Apr 2026 — 7,359,633 / 30
        4: 245321    // May 2026 — proxy from Apr (May export was a duplicate of Apr)
    };
    const HISTORY_START = new Date('2026-01-01');

    function updateBurnTimeline(today, roster, daysOut) {
        const ctx = document.getElementById('burnTimelineChart').getContext('2d');
        if (burnTimelineChart) burnTimelineChart.destroy();

        const labels = [];
        const actual = [];
        const projected = [];
        const horizonEnd = new Date(today); horizonEnd.setDate(horizonEnd.getDate() + 60);

        const cursor = new Date(HISTORY_START);
        while (cursor <= horizonEnd) {
            labels.push(new Date(cursor).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }));
            const isHistorical = cursor < today;
            const isAnchor = cursor.toDateString() === today.toDateString() ||
                             (cursor < today && new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate() + 7) > today);
            if (isHistorical) {
                const monthIdx = cursor.getMonth();
                actual.push(HISTORY_MONTHLY[monthIdx] ?? null);
                projected.push(null);
            } else {
                actual.push(null);
                projected.push(dayBurn(roster, cursor));
            }
            cursor.setDate(cursor.getDate() + 7);
        }

        // Stitch the two series together at the anchor so the line is continuous
        const lastActualIdx = actual.findLastIndex(v => v !== null);
        const firstProjIdx = projected.findIndex(v => v !== null);
        if (lastActualIdx >= 0 && firstProjIdx >= 0 && firstProjIdx === lastActualIdx + 1) {
            projected[lastActualIdx] = actual[lastActualIdx];
        }

        burnTimelineChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    { label: 'Actual', data: actual, borderColor: '#3498db', backgroundColor: 'rgba(52,152,219,0.12)', fill: true, tension: 0.45, cubicInterpolationMode: 'monotone', pointRadius: 0, spanGaps: false },
                    { label: 'Projected', data: projected, borderColor: '#e67e22', backgroundColor: 'rgba(230,126,34,0.12)', fill: true, tension: 0.45, cubicInterpolationMode: 'monotone', pointRadius: 0, borderDash: [6, 4], spanGaps: false }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: true, position: 'top', labels: { color: '#9ea7b3', boxWidth: 12, font: { size: 11 } } } },
                scales: {
                    y: { min: 0, max: 350000, grid: { color: '#2d333b' }, ticks: { color: '#9ea7b3', stepSize: 50000, callback: v => (v / 1000).toFixed(0) + 'k' } },
                    x: { grid: { display: false }, ticks: { color: '#9ea7b3', maxTicksLimit: 12 } }
                }
            }
        });
    }

    function updateCategoryChart(roster, today) {
        const ctx = document.getElementById('categoryChart').getContext('2d');
        if (catChart) catChart.destroy();
        const sorted = roster.filter(u => u.depart >= today && u.burn > 0).sort((a, b) => b.burn - a.burn);
        const palette = ['#e67e22', '#d35400', '#f39c12', '#3498db', '#2980b9', '#27ae60', '#16a085'];
        catChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: sorted.map(u => u.name),
                datasets: [{ data: sorted.map(u => u.burn), backgroundColor: palette.slice(0, sorted.length), borderWidth: 0 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom', labels: { color: '#e0e0e0', padding: 10, font: { size: 11 }, boxWidth: 10 } } },
                cutout: '60%'
            }
        });
    }

    buildRoster();
    recompute();
</script>
</body>
</html>
