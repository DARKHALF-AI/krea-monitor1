<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Half | KREA Runway Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d23;
            --accent-blue: #3498db;
            --accent-orange: #e67e22;
            --accent-green: #27ae60;
            --text-main: #e0e0e0;
            --text-dim: #9ea7b3;
            --border: #2d333b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
        }
        h1 { margin: 0; font-weight: 300; letter-spacing: 2px; }
        .controls {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
        input[type="number"], input[type="date"], input[type="file"], input[type="text"] {
            width: 100%;
            background: #2d333b;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 13px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); }
        .card h3 { margin: 0; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 1.7rem; font-weight: 700; margin-top: 12px; color: var(--accent-blue); }
        .card.alert .value { color: var(--accent-orange); }
        .card.good .value { color: var(--accent-green); }
        .card .sub { font-size: 0.7rem; color: var(--text-dim); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

        .roster-card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 30px;
        }
        .roster-card h2 {
            margin: 0 0 16px 0;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
        }
        .roster-table {
            width: 100%;
            border-collapse: collapse;
        }
        .roster-table th {
            text-align: left;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            font-weight: 500;
        }
        .roster-table td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            font-size: 13px;
        }
        .roster-table tr:last-child td { border-bottom: none; }
        .roster-table .email { color: var(--text-main); }
        .roster-table input[type="number"], .roster-table input[type="date"] {
            padding: 6px 8px;
            font-size: 12px;
        }
        .roster-table .burn-cell input { width: 110px; }
        .roster-table .date-cell input { width: 150px; }
        .roster-table .pct-cell { color: var(--text-dim); width: 60px; text-align: right; }

        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .chart-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            min-height: 400px;
        }
        .status-badge {
            background: #27ae60;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .roster-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            justify-content: flex-end;
        }
        .roster-actions button {
            background: #2d333b;
            color: var(--text-main);
            border: 1px solid #444;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }
        .roster-actions button:hover { background: #3a414b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>DARK HALF | <span style="color:var(--accent-orange)">RUNWAY</span></h1>
        <div id="status" class="status-badge">System Ready</div>
    </div>

    <div class="controls">
        <div class="input-group">
            <label>Remaining Credits</label>
            <input type="number" id="remainingCredits" value="9900000" step="100000">
        </div>
        <div class="input-group">
            <label>Today (anchor)</label>
            <input type="date" id="anchorDate" value="2026-05-06">
        </div>
        <div class="input-group">
            <label>Upload Weekly CSVs</label>
            <input type="file" id="fileInput" multiple accept=".csv">
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Projected Runway</h3>
            <div class="value" id="runwayVal">-- Days</div>
            <div class="sub" id="runwayWeeks"></div>
        </div>
        <div class="card alert">
            <h3>Current Daily Burn</h3>
            <div class="value" id="currentBurnVal">--</div>
            <div class="sub">Sum of active users</div>
        </div>
        <div class="card alert">
            <h3>Exhaustion Date</h3>
            <div class="value" id="exhaustionDateVal">--</div>
            <div class="sub" id="exhaustionRelative"></div>
        </div>
    </div>

    <div class="roster-card">
        <h2>Account Roster &mdash; Departure Schedule</h2>
        <table class="roster-table">
            <thead>
                <tr>
                    <th>Account</th>
                    <th style="text-align:right">Daily Burn (CU)</th>
                    <th style="text-align:right">% of Total</th>
                    <th>Departure Date</th>
                </tr>
            </thead>
            <tbody id="rosterBody"></tbody>
        </table>
        <div class="roster-actions">
            <button onclick="resetDeparturesTo('2027-12-31')">Reset all to Dec 31, 2027</button>
            <button onclick="resetDeparturesTo('2026-05-20')">All depart May 20, 2026</button>
        </div>
    </div>

    <div class="chart-grid">
        <div class="chart-box">
            <h3 style="color:var(--text-dim); font-size: 0.8rem; margin-top:0">PROJECTED DAILY BURN OVER TIME</h3>
            <canvas id="burnTimelineChart"></canvas>
        </div>
        <div class="chart-box">
            <h3 style="color:var(--text-dim); font-size: 0.8rem; margin-top:0">BURN BY ACCOUNT</h3>
            <canvas id="categoryChart"></canvas>
        </div>
    </div>
</div>

<script>
    // Per-user daily burn defaults computed from APR 2026 data (30 days, full month)
    // qali fell to ~0 in APR; using MAR avg as a more representative baseline
    const ROSTER = [
        { email: 'jkinnear@creamproductions.com',       burn: 59899, depart: '2026-05-15' },
        { email: 'lordgodfrey@gmail.com',               burn: 41610, depart: '2027-12-31' },
        { email: 'sacha.d.m.mitchell@gmail.com',        burn: 34054, depart: '2027-12-31' },
        { email: 'will@bluesheepfilms.com',             burn: 28107, depart: '2027-12-31' },
        { email: 'connect@martyflanagan.ca',            burn: 25752, depart: '2026-05-15' },
        { email: 'amacdonald@creamproductions.com',     burn: 25483, depart: '2027-12-31' },
        { email: 'skozak@creamproductions.com',         burn: 19396, depart: '2026-04-01' }
    ];

    let globalData = { history: [], categories: {} };
    let burnTimelineChart, catChart;

    function buildRoster() {
        const tbody = document.getElementById('rosterBody');
        tbody.innerHTML = '';
        ROSTER.forEach((u, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="email">${u.email}</td>
                <td class="burn-cell" style="text-align:right">
                    <input type="number" id="burn-${i}" value="${u.burn}" step="100" min="0" style="text-align:right">
                </td>
                <td class="pct-cell" id="pct-${i}">--</td>
                <td class="date-cell">
                    <input type="date" id="date-${i}" value="${u.depart}">
                </td>
            `;
            tbody.appendChild(tr);
        });
        ROSTER.forEach((u, i) => {
            document.getElementById(`burn-${i}`).addEventListener('input', recompute);
            document.getElementById(`date-${i}`).addEventListener('change', recompute);
        });
    }

    function readRoster() {
        return ROSTER.map((u, i) => ({
            email: u.email,
            burn: parseFloat(document.getElementById(`burn-${i}`).value) || 0,
            depart: new Date(document.getElementById(`date-${i}`).value)
        }));
    }

    function resetDeparturesTo(dateStr) {
        ROSTER.forEach((_, i) => {
            document.getElementById(`date-${i}`).value = dateStr;
        });
        recompute();
    }

    document.getElementById('fileInput').addEventListener('change', handleFiles);
    document.getElementById('remainingCredits').addEventListener('input', recompute);
    document.getElementById('anchorDate').addEventListener('change', recompute);

    async function handleFiles(e) {
        const files = Array.from(e.target.files);
        globalData.history = [];
        globalData.categories = {};
        for (const file of files) await parseFile(file);
        updateCharts();
        recompute();
        const status = document.getElementById('status');
        status.innerText = `${files.length} Files Loaded`;
        status.style.background = '#2980b9';
    }

    function parseFile(file) {
        return new Promise((resolve) => {
            Papa.parse(file, {
                header: true, skipEmptyLines: true,
                complete: function(results) { processResults(results.data, file.name); resolve(); }
            });
        });
    }

    function processResults(data, fileName) {
        let fileTotal = 0;
        data.forEach(row => {
            if (row['Category'] && row['Compute Units'] && row['Category'] !== 'Total') {
                const units = parseFloat(String(row['Compute Units']).replace(/,/g, '')) || 0;
                globalData.categories[row['Category']] = (globalData.categories[row['Category']] || 0) + units;
                fileTotal += units;
            }
        });
        if (fileTotal > 0) globalData.history.push({ name: fileName.split(' ')[0], units: fileTotal });
    }

    function dayBurn(roster, date) {
        return roster.filter(u => u.depart >= date).reduce((s, u) => s + u.burn, 0);
    }

    function recompute() {
        const credits = parseFloat(document.getElementById('remainingCredits').value) || 0;
        const anchorStr = document.getElementById('anchorDate').value;
        const today = anchorStr ? new Date(anchorStr) : new Date('2026-05-06');
        const roster = readRoster();

        // Update % of total in roster
        const totalToday = roster.reduce((s, u) => s + u.burn, 0);
        roster.forEach((u, i) => {
            const pct = totalToday > 0 ? (u.burn / totalToday * 100) : 0;
            document.getElementById(`pct-${i}`).innerText = pct.toFixed(1) + '%';
        });

        // Walk day-by-day
        let remaining = credits;
        let days = 0;
        const cursor = new Date(today);
        const MAX_DAYS = 365 * 5;
        while (days < MAX_DAYS) {
            const burn = dayBurn(roster, cursor);
            if (burn <= 0) { days = MAX_DAYS; break; }
            if (remaining < burn) break;
            remaining -= burn;
            days++;
            cursor.setDate(cursor.getDate() + 1);
        }

        // KPIs
        document.getElementById('runwayVal').innerText = days >= MAX_DAYS ? '5+ Years' : days + ' Days';
        const weeks = (days / 7).toFixed(1);
        document.getElementById('runwayWeeks').innerText = days >= MAX_DAYS ? '' : `${weeks} weeks`;

        document.getElementById('currentBurnVal').innerText = Math.round(totalToday).toLocaleString();

        // Exhaustion date
        const exhaustDate = new Date(today);
        exhaustDate.setDate(today.getDate() + days);
        if (days >= MAX_DAYS) {
            document.getElementById('exhaustionDateVal').innerText = 'Beyond 2031';
            document.getElementById('exhaustionRelative').innerText = '';
        } else {
            document.getElementById('exhaustionDateVal').innerText = exhaustDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
            document.getElementById('exhaustionRelative').innerText = `In ${days} days`;
        }

        updateBurnTimeline(today, roster, days);
        updateCategoryChart(roster);
    }

    function updateBurnTimeline(today, roster, daysOut) {
        const ctx = document.getElementById('burnTimelineChart').getContext('2d');
        if (burnTimelineChart) burnTimelineChart.destroy();

        // Build series: today -> exhaustion (or 18 months, whichever sooner), step at each departure
        const horizon = Math.min(Math.max(daysOut + 30, 90), 540);
        const labels = [];
        const data = [];
        const cursor = new Date(today);
        for (let i = 0; i <= horizon; i += 7) {
            labels.push(new Date(cursor).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }));
            data.push(dayBurn(roster, cursor));
            cursor.setDate(cursor.getDate() + 7);
        }

        burnTimelineChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Daily burn (CU)',
                    data,
                    borderColor: '#e67e22',
                    backgroundColor: 'rgba(230, 126, 34, 0.12)',
                    fill: true,
                    tension: 0.05,
                    stepped: true,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#2d333b' }, ticks: { color: '#9ea7b3', callback: v => (v/1000).toFixed(0)+'k' } },
                    x: { grid: { display: false }, ticks: { color: '#9ea7b3', maxTicksLimit: 10 } }
                }
            }
        });
    }

    function updateCategoryChart(roster) {
        const ctx = document.getElementById('categoryChart').getContext('2d');
        if (catChart) catChart.destroy();
        const sorted = roster.slice().sort((a,b) => b.burn - a.burn).filter(u => u.burn > 0);
        const palette = ['#e67e22','#d35400','#f39c12','#3498db','#2980b9','#27ae60','#16a085','#9b59b6','#c0392b'];
        catChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: sorted.map(u => u.email.split('@')[0]),
                datasets: [{ data: sorted.map(u => u.burn), backgroundColor: palette.slice(0, sorted.length), borderWidth: 0 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#e0e0e0', padding: 10, font: { size: 11 }, boxWidth: 10 } }
                },
                cutout: '60%'
            }
        });
    }

    function updateCharts() {
        // Reserved for any CSV-driven chart updates if added later
    }

    buildRoster();
    recompute();
</script>
</body>
</html>
