<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKHALF KREA GAS GAUGE</title>
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #0a0a0c;
            --surface-accent: #121216;
            --border-color: #222226;
            --text-primary: #ffffff;
            --text-secondary: #a0a0aa;
            --text-muted: #52525b;
            --cyan-accent: #00d4ff;
            --green-accent: #39ff14;
            --orange-accent: #ffa500;
            --red-accent: #ff3131;
            --purple-accent: #d400ff;
            --gold-accent: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-logo {
            height: 42px;
            width: auto;
            object-fit: contain;
            display: block;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--cyan-accent);
        }

        /* Aviation Fuel/Gas Gauge Component Styling */
        .gauge-container {
            width: 90px;
            height: 90px;
            position: relative;
            background: radial-gradient(circle, #15151c 0%, #050508 100%);
            border: 3px solid #1c1c24;
            border-radius: 50%;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .gauge-svg {
            width: 100%;
            height: 100%;
        }

        .gauge-needle {
            transform-origin: 45px 45px;
            stroke: var(--red-accent);
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        .gauge-center-cap {
            fill: #2a2a35;
            stroke: #09090d;
            stroke-width: 1.5;
        }

        .gauge-text {
            font-size: 8px;
            font-weight: bold;
            fill: var(--text-muted);
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        .gauge-text.label-e { fill: var(--red-accent); }
        .gauge-text.label-f { fill: var(--cyan-accent); }

        /* Ledger & Forecaster Widget Styles */
        .ledger-box {
            background: linear-gradient(135deg, #061118 0%, #020507 100%);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            padding: 24px;
        }

        .ledger-title {
            color: var(--cyan-accent);
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
            font-weight: bold;
        }

        .ledger-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        @media (min-width: 768px) {
            .ledger-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .ledger-cell {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 16px 12px;
            border-radius: 6px;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            font-weight: bold;
        }

        .ledger-value {
            font-size: 16px;
            font-weight: bold;
            display: block;
            color: var(--text-primary);
            margin-top: 4px;
        }

        .ledger-value span {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: normal;
        }

        .ledger-value.highlight { color: var(--cyan-accent); }
        .ledger-value.green { color: var(--green-accent); }

        /* Credits Input Synchronizer Styling */
        .credits-sync-container {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 6px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .credits-input-field {
            background: #000;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            width: 150px;
            text-align: right;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .credits-input-field:focus {
            border-color: var(--cyan-accent);
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
        }

        .ledger-note {
            margin-top: 16px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
            line-height: 1.4;
        }

        .help-trigger {
            display: inline-block;
            width: 14px;
            height: 14px;
            background-color: rgba(0, 212, 255, 0.15);
            color: var(--cyan-accent);
            border-radius: 50%;
            font-size: 9px;
            line-height: 14px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            border: 1px solid rgba(0, 212, 255, 0.3);
            transition: all 0.2s ease;
        }

        .help-trigger:hover {
            background-color: var(--cyan-accent);
            color: #000000;
            box-shadow: 0 0 8px var(--cyan-accent);
        }

        .popup-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background-color: #0d0d11;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            max-width: 480px;
            width: 90%;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.1);
            position: relative;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .popup-header {
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
        }
        
        .popup-header.header-contract { color: var(--cyan-accent); }
        .popup-header.header-fictional { color: var(--green-accent); }
        .popup-header.header-realism { color: var(--red-accent); }
        .popup-header.header-discount { color: var(--gold-accent); }

        .popup-text {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .popup-close-btn {
            background-color: var(--cyan-accent);
            color: #000000;
            border: none;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            float: right;
            transition: opacity 0.2s ease;
        }

        .popup-close-btn:hover { opacity: 0.9; }

        /* Minute Slider Forecaster Layout */
        .forecaster-panel {
            margin-top: 24px;
            padding-top: 24px;
            border-top:
